<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Weather — RainRoad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl mx-auto">
        <nav class="nav-links">
            <a href="rain-road.html" class="nav-link">Compare Forecasts</a>
            <a href="local-weather.html" class="nav-link active">Local Weather</a>
        </nav>

        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-cyan-400">Local Weather</h1>
            <p class="text-gray-400 mt-1 text-sm">See yesterday's weather, today's forecast, and the change between them.</p>
        </header>

        <div class="flex justify-center mb-6">
            <button id="location-btn" class="btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v2"/>
                    <path d="M12 20v2"/>
                    <path d="m4.93 4.93 1.41 1.41"/>
                    <path d="m17.66 17.66 1.41 1.41"/>
                    <path d="M2 12h2"/>
                    <path d="M20 12h2"/>
                    <path d="m6.34 17.66-1.41 1.41"/>
                    <path d="m19.07 4.93-1.41 1.41"/>
                </svg>
                Use My Location
            </button>
        </div>

        <div id="loader" class="loader hidden">
            <svg class="animate-spin h-8 w-8 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-xl text-gray-300">Fetching weather data...</span>
        </div>

        <div id="error-message" class="error-message location-error hidden">
            <p id="error-text" class="message"></p>
            <div class="search-fallback">
                <input type="text" id="manual-location" class="input-field" placeholder="Enter city name">
                <button id="search-btn" class="btn-primary">Search</button>
            </div>
        </div>

        <div id="weather-cards" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div id="yesterday-card" class="card"></div>
                <div id="today-card" class="card"></div>
                <div id="delta-card" class="card"></div>
            </div>
        </div>
    </div>

    <script>
        const locationBtn = document.getElementById('location-btn');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const weatherCards = document.getElementById('weather-cards');
        const yesterdayCard = document.getElementById('yesterday-card');
        const todayCard = document.getElementById('today-card');
        const deltaCard = document.getElementById('delta-card');
        const manualLocation = document.getElementById('manual-location');
        const searchBtn = document.getElementById('search-btn');

        const rainIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block icon"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>`;
        const windIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block icon"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>`;

        locationBtn.addEventListener('click', requestLocation);
        manualLocation.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchByLocation();
        });
        searchBtn.addEventListener('click', searchByLocation);

        function requestLocation() {
            showLoader(true);
            showError(null);
            weatherCards.classList.add('hidden');

            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser.');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    fetchWeatherByCoords(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    let message = 'Could not access your location.';
                    if (error.code === error.PERMISSION_DENIED) {
                        message += ' Please allow location access or search for a city below.';
                    }
                    showError(message);
                }
            );
        }

        function searchByLocation() {
            const query = manualLocation.value.trim();
            if (!query) {
                showError('Please enter a city name.');
                return;
            }
            showLoader(true);
            showError(null);
            fetchWeatherByCity(query);
        }

        async function fetchWeatherByCity(cityName) {
            try {
                const geoResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1`);
                if (!geoResponse.ok) throw new Error('Geocoding failed');
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError(`Could not find location: ${cityName}`);
                    return;
                }

                const { latitude, longitude, name } = geoData.results[0];
                await fetchWeatherData(latitude, longitude, name);
            } catch (error) {
                showError('Failed to fetch location data. Please try again.');
            }
        }

        async function fetchWeatherByCoords(lat, lon) {
            await fetchWeatherData(lat, lon, 'Your Location');
        }

        async function fetchWeatherData(lat, lon, locationName) {
            try {
                const [todayResponse, yesterdayResponse] = await Promise.all([
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,rain_sum,wind_speed_10m_max&temperature_unit=celsius&wind_speed_unit=mph&timezone=auto&forecast_days=1`),
                    fetch(`https://api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${getYesterdayDate()}&end_date=${getYesterdayDate()}&daily=temperature_2m_max,temperature_2m_min,rain_sum,wind_speed_10m_max&temperature_unit=celsius&wind_speed_unit=mph&timezone=auto`)
                ]);

                if (!todayResponse.ok) throw new Error('Failed to fetch today\'s weather');
                if (!yesterdayResponse.ok) throw new Error('Failed to fetch yesterday\'s weather');

                const todayData = await todayResponse.json();
                const yesterdayData = await yesterdayResponse.json();

                renderWeatherCards(yesterdayData.daily, todayData.daily);
            } catch (error) {
                showError('Failed to fetch weather data. Please try again.');
            }
        }

        function getYesterdayDate() {
            const date = new Date();
            date.setDate(date.getDate() - 1);
            return date.toISOString().split('T')[0];
        }

        function renderWeatherCards(yesterday, today) {
            const yesterdayDate = new Date(yesterday.time[0] + 'T00:00:00');
            const todayDate = new Date(today.time[0] + 'T00:00:00');

            yesterdayCard.innerHTML = `
                <div class="card-header">Yesterday</div>
                <div class="text-xs text-gray-400 mb-2">${yesterdayDate.toLocaleDateString('en-UK', { weekday: 'long', day: 'numeric', month: 'short' })}</div>
                <div class="temperature-large mb-2">${Math.round(today.temperature_2m_max[0])}°/${Math.round(today.temperature_2m_min[0])}°</div>
                <div class="flex flex-col gap-1">
                    <div class="weather-metric">${rainIcon} <span class="value">${yesterday.rain_sum[0].toFixed(1)} mm</span></div>
                    <div class="weather-metric">${windIcon} <span class="value">${Math.round(yesterday.wind_speed_10m_max[0])} mph</span></div>
                </div>
            `;

            todayCard.innerHTML = `
                <div class="card-header">Today</div>
                <div class="text-xs text-gray-400 mb-2">${todayDate.toLocaleDateString('en-UK', { weekday: 'long', day: 'numeric', month: 'short' })}</div>
                <div class="temperature-large mb-2">${Math.round(today.temperature_2m_max[0])}°/${Math.round(today.temperature_2m_min[0])}°</div>
                <div class="flex flex-col gap-1">
                    <div class="weather-metric">${rainIcon} <span class="value">${today.rain_sum[0].toFixed(1)} mm</span></div>
                    <div class="weather-metric">${windIcon} <span class="value">${Math.round(today.wind_speed_10m_max[0])} mph</span></div>
                </div>
            `;

            const deltaHigh = today.temperature_2m_max[0] - yesterday.temperature_2m_max[0];
            const deltaLow = today.temperature_2m_min[0] - yesterday.temperature_2m_min[0];
            const deltaRain = today.rain_sum[0] - yesterday.rain_sum[0];
            const deltaWind = today.wind_speed_10m_max[0] - yesterday.wind_speed_10m_max[0];

            deltaCard.innerHTML = `
                <div class="card-header">Delta</div>
                <div class="flex flex-col gap-2">
                    <div>
                        <div class="text-xs text-gray-500 mb-1">Temperature</div>
                        <div class="flex gap-2">
                            ${formatDelta(deltaHigh, true)}
                            <span class="text-gray-400">/</span>
                            ${formatDelta(deltaLow, true)}
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-xs text-gray-500">Rain</div>
                        ${formatDelta(deltaRain, false)}
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-xs text-gray-500">Wind</div>
                        ${formatDelta(deltaWind, false)}
                    </div>
                </div>
            `;

            showLoader(false);
            weatherCards.classList.remove('hidden');
        }

        function formatDelta(value, isTemperature) {
            const arrow = value >= 0 ? '↑' : '↓';
            const absValue = Math.abs(value);
            const displayValue = isTemperature ? Math.round(absValue) + '°' : absValue.toFixed(1);
            const cssClass = value >= 0 ? 'up' : 'down';
            return `<span class="delta-badge ${cssClass}">${arrow}${displayValue}</span>`;
        }

        function showLoader(visible) {
            loader.classList.toggle('hidden', !visible);
            locationBtn.disabled = visible;
        }

        function showError(message) {
            showLoader(false);
            if (message) {
                errorText.textContent = message;
                errorMessage.classList.remove('hidden');
            } else {
                errorMessage.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
